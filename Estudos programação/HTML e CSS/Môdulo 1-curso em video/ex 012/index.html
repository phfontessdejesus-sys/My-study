<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas mistas e listas de definição</title>
    <style>
        body{
            background-color:antiquewhite
        }
    </style>
</head>
<body>
    <h1>Listas </h1>
    <h2>Minhas linguagens favoritas</h2>
    <ol>
        <li>Antigas</li>
        <ul type="A">
            <li>Clipper</li>
            <li>Fortran</li>
            <li>Delphi</li>
        </ul> <!--Sublista-->
        <li>Novas</li>
        <ul type="a" start ="4">
            <li>Python</li>
            <li>Javascript</li>
        </ul>
    </ol>
    <h2>Listas de definições</h2>
    <dl>
        <dt>HTML</dt>
        <dd>Linguagem de marcação</dd>
        <dt>CSS</dt>
        <dd>Linguagem de marcação para desig</dd>
        <dt>Javascript</dt>
        <dd>Linguagem de programação</dd>
    </dl>
</body>
</html>
