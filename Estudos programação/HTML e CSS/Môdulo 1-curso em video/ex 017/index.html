<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áudio</title>
</head>
<body>
    <h1>Colocando áudio no site</h1>
    <audio src="midia/2 Minutos de Relaxamento - Adriano Menezes Terapia (youtube).mp3" controls autoplay></audio>
    <h2>Ou podemos fazer assim</h2>
    <p>&lt;audio&gt; <br>
    &lt;source src="" type=""&gt;<br>
    &lt;/audio&gt;</p>
    <audio preload="metadata" controls>
        <source src="midia/2 Minutos de Relaxamento - Adriano Menezes Terapia (youtube).mp3" type="audio/mpeg">
    </audio>
    <p>metadata só carrega o audio depois de você clicar no botão</p>
    <p>auto o site só carrega depois de o audio carrefar</p>
    <p>nono não carrega nada</p>
</body>
</html>
