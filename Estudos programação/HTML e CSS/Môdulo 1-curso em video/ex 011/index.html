<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Lista </title>
    <style>
        body{
            background-color:antiquewhite
        }
        mark{
            background-color:aquamarine
        }
    </style>
</head>
<body>
    <h1>Trabalhando com listas</h1>
    <h2>Listas ordenadas</h2>
    <ol>
        <li>Acordar</li>
        <li>Tomar café da manhã</li>
        <li>Arrumar-se para a faculdade</li>
    </ol>
    <hr>
    <p>Podemos fazer uma lista desodernada assim</p>
    <ul>
        <li>Acordar 8 horas</li>
        <li>Pagar impostos</li>
        <li>Ir na loterica</li>
    </ul>
</body>
</html>
