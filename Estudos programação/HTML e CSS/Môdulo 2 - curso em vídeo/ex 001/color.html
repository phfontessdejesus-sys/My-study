<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color uses CSS</title>
    <style>
        *{
            height: 100%;
        }
        body{
            background-color: #2e2e;
            background-image: linear-gradient(to top,#F916D5, #FE0B5F,  #FFC704);

    </style>
</head>
<body>
    <h1>Test gradient</h1>
</body>
</html>
